<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查詢結果</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <h1 id="heading">查詢結果</h1>

      <div class="table-wrap">
        <table id="result-table">
          <thead>
            <tr>
              <th>公司名稱</th>
              <th>碳排放</th>
              <th>詳細</th>
            </tr>
          </thead>
          <tbody id="result-body"></tbody>
        </table>
      </div>

      <p id="no-result" style="display:none;">查無相關資料</p>

      <a class="btn-back" href="index.html">返回查詢</a>
    </div>

    <script src="data.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const query = (params.get('industry') || '').trim();

      if (query) {
        document.getElementById('heading').textContent = '「' + query + '」查詢結果';
      }

      const matched = database
        .filter(row => row.industry.includes(query) || query.includes(row.industry))
        .sort((a, b) => {
          const na = parseFloat(a.carbon) || Infinity;
          const nb = parseFloat(b.carbon) || Infinity;
          return na - nb;
        });

      function roundCarbon(carbonStr) {
        if (carbonStr === '未申報') return '<span style="color:#c62828;font-weight:600;">未申報</span>';
        const num = parseFloat(carbonStr.replace(/,/g, ''));
        if (isNaN(num)) return carbonStr;
        const unit = carbonStr.replace(/[\d,\.]+/, '').trim();
        let display;
        if (num >= 1e8) {
          display = (num / 1e8).toFixed(1) + ' 億';
        } else if (num >= 1e4) {
          display = (num / 1e4).toFixed(1) + ' 萬';
        } else {
          display = Math.round(num).toLocaleString();
        }
        return '約 ' + display + ' ' + unit;
      }

      const tbody = document.getElementById('result-body');

      if (matched.length === 0) {
        document.getElementById('result-table').style.display = 'none';
        document.getElementById('no-result').style.display = 'block';
      } else {
        matched.forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${row.name}</td>
            <td>${roundCarbon(row.carbon)}</td>
            <td><a href="detail.html?name=${encodeURIComponent(row.name)}">查看</a></td>
          `;
          tbody.appendChild(tr);
        });
      }
    </script>
  </body>
</html>
