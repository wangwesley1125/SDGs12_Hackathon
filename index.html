<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>企業碳排採購系統</title>
    </head>

    <body>
        <h1>輸入您所需的行業</h1>
        <input type="text" id="industry" placeholder="例如：塑膠容器製造…">
        
        <button onclick="search()">
            確認
        </button>

        <script>
            function search() {
            const value = document.getElementById('industry').value.trim();
            if (!value) return;
            window.location.href = 'results.html?industry=' + encodeURIComponent(value);
            }

            document.getElementById('industry').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') search();
            });
        </script>
    </body>

</html>
