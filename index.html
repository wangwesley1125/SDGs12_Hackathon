<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>企業採購碳排比對系統</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <!-- 背景圖層（blur 在這層，內容不受影響）-->
        <div class="bg-blur"></div>
        <nav class="navbar">
            <div class="nav-brand">
                <span class="nav-brand-sub">Eco-CO2</span>
                <span class="nav-brand-main">企業採購碳排比對系統</span>
            </div>
            <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="選單">☰</button>
            <div class="nav-links" id="nav-links">
                <div class="dropdown">
                    <button class="nav-btn" onclick="toggleDropdown()">行業類別 ▾</button>
                    <ul class="dropdown-menu" id="industry-menu"></ul>
                </div>
                <div class="nav-badge-wrap">
                    <a class="nav-btn" href="calculate.html">計算總排</a>
                    <span class="nav-badge" id="saved-badge" style="display:none;"></span>
                </div>
                <a class="nav-btn" href="about.html">關於我們</a>
            </div>
        </nav>

        <div class="search-box">
            <p class="search-label">輸入您所需的行業</p>
            <input type="text" id="industry" placeholder="例如：塑膠容器製造…">
            <button onclick="search()">查詢</button>
            <a class="link-hint" href="https://carbonfee.moenv.gov.tw/" target="_blank">未申報？點此進申報</a>
        </div>

        <footer class="footer">
            <p>© 2026 企業採購碳排比對系統. All rights reserved.</p>
        </footer>

        <script src="data.js"></script>
        <script>
            // 搜尋
            function search() {
                const value = document.getElementById('industry').value.trim();
                if (!value) return;
                window.location.href = 'results.html?industry=' + encodeURIComponent(value);
            }

            document.getElementById('industry').addEventListener('keydown', function (e) {
                if (e.key === 'Enter') search();
            });

            // 從 database 抓出不重複的行業，產生下拉選單
            const industries = [...new Set(database.map(r => r.industry))];
            const menu = document.getElementById('industry-menu');
            industries.forEach(ind => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="results.html?industry=${encodeURIComponent(ind)}">${ind}</a>`;
                menu.appendChild(li);
            });

            // 儲存數量 badge
            const savedCount = JSON.parse(localStorage.getItem('savedCompanies') || '[]').length;
            if (savedCount > 0) {
                const badge = document.getElementById('saved-badge');
                badge.textContent = savedCount;
                badge.style.display = 'block';
            }

            // 漢堡選單開關
            function toggleMenu() {
                const links = document.getElementById('nav-links');
                const btn = document.getElementById('hamburger');
                const open = links.classList.toggle('open');
                btn.textContent = open ? '✕' : '☰';
            }

            // 下拉開關
            function toggleDropdown() {
                menu.classList.toggle('open');
            }

            // 點外面關閉
            document.addEventListener('click', function (e) {
                if (!e.target.closest('.dropdown')) {
                    menu.classList.remove('open');
                }
            });
        </script>
    </body>

</html>
