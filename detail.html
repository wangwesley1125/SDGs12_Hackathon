<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司詳細資料</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container" style="padding-bottom: 5rem;">
      <h1 id="company-name">公司詳細資料</h1>

      <div class="table-wrap">
        <table id="detail-table">
          <tbody>
            <tr><th>行業別</th><td id="d-industry"></td></tr>
            <tr><th>總碳排放量</th><td id="d-carbon"></td></tr>
            <tr><th>直接排放量</th><td id="d-scope1"></td></tr>
            <tr><th>間接排放量</th><td id="d-scope2"></td></tr>
            <tr><th>電話</th><td id="d-phone"></td></tr>
            <tr><th>網址</th><td><a id="d-website" href="#" target="_blank"></a></td></tr>
          </tbody>
        </table>
      </div>

      <p id="not-found" style="display:none;">找不到該公司資料</p>

      <hr>

      <h2>聯絡廠商</h2>
      <p class="mail-to">收件人：<span id="d-email"></span></p>
      <textarea id="mail-body" rows="8" placeholder="請輸入信件內容…"></textarea>
    </div>

    <!-- 底部固定 action bar -->
    <div class="bottom-bar">
      <a class="bottom-bar-btn outline" href="javascript:history.back()">上一頁</a>
      <button class="bottom-bar-btn" onclick="sendMail()">送出信件</button>
      <button class="bottom-bar-btn" id="save-btn" onclick="saveCompany()">儲存</button>
    </div>

    <div class="save-toast" id="save-toast">儲存成功 ✓</div>

    <script src="data.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const name = (params.get('name') || '').trim();

      const company = database.find(row => row.name === name);

      if (!company) {
        document.getElementById('detail-table').style.display = 'none';
        document.getElementById('not-found').style.display = 'block';
      } else {
        document.getElementById('company-name').textContent = company.name;
        document.getElementById('d-industry').textContent = company.industry;
        const carbonEl = document.getElementById('d-carbon');
        if (company.carbon === '未申報') {
          carbonEl.innerHTML = '<span style="color:#c62828;font-weight:600;">未申報</span>';
        } else {
          carbonEl.textContent = company.carbon;
        }
        document.getElementById('d-scope1').textContent = company.scope1;
        document.getElementById('d-scope2').textContent = company.scope2;
        document.getElementById('d-phone').textContent = company.phone;
        document.getElementById('d-email').textContent = company.email;

        const websiteLink = document.getElementById('d-website');
        websiteLink.textContent = company.website;
        websiteLink.href = company.website;
      }

      function updateSaveBtn() {
        const saved = JSON.parse(localStorage.getItem('savedCompanies') || '[]');
        const btn = document.getElementById('save-btn');
        if (saved.some(c => c.name === name)) {
          btn.textContent = '已儲存';
          btn.disabled = true;
          btn.style.background = '#aaa';
        } else {
          btn.textContent = '儲存';
          btn.disabled = false;
          btn.style.background = '';
        }
      }
      updateSaveBtn();

      function saveCompany() {
        if (!company) return;
        const saved = JSON.parse(localStorage.getItem('savedCompanies') || '[]');
        if (saved.some(c => c.name === company.name)) return;
        saved.push({ name: company.name, carbon: company.carbon, industry: company.industry });
        localStorage.setItem('savedCompanies', JSON.stringify(saved));
        updateSaveBtn();

        const toast = document.getElementById('save-toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      }

      function sendMail() {
        const content = document.getElementById('mail-body').value.trim();
        if (!content) {
          alert('請輸入信件內容');
          return;
        }
        alert('信件已送出！');
        document.getElementById('mail-body').value = '';
      }
    </script>
  </body>
</html>
